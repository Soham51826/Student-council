<div class="container">

<h2>Student Registration</h2>

<form (submit)="register()">

<input type="text"
placeholder="Full Name"
[(ngModel)]="name"
name="name"
required>

<input type="email"
placeholder="Email"
[(ngModel)]="email"
name="email"
required>

<input type="text"
placeholder="Phone Number"
[(ngModel)]="phone"
name="phone"
required>

<input type="password"
placeholder="Password"
[(ngModel)]="password"
name="password"
required>

<input type="password"
placeholder="Confirm Password"
[(ngModel)]="confirmPassword"
name="confirmPassword"
required>

<button type="submit">Register</button>

</form>

</div>
